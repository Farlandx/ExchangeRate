name: Update Exchange Rate

on:
  schedule:
    # Run at non-peak minutes to reduce dropped scheduled jobs on GitHub Actions.
    - cron: "7,37 1-9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-rate
  cancel-in-progress: false

jobs:
  update-rate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch rate
        run: pnpm run fetch:rate

      - name: Commit updated rate
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 更新匯率資料"
          file_pattern: public/rate.json
