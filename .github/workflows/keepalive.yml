name: Keepalive

# GitHub automatically disables scheduled workflows in repositories that have
# had no activity for 60 days. This workflow re-enables them once a month.

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keep scheduled workflows alive
        uses: gautamkrishnar/keepalive-workflow@v2
